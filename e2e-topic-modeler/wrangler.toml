# E2E Topic Modeler — Cloudflare Pages Configuration
# The static site is deployed on Pages. API calls go to a separate Worker.
#
# Deploy static site: npx wrangler pages deploy public/ --project-name=e2e-topic-modeler
# Deploy worker:      cd worker && wrangler deploy

name = "e2e-topic-modeler"
compatibility_date = "2024-12-01"

# NOTE: This project does NOT use Pages Functions.
# API keys are served by the worker in worker/ (deployed separately).
# Set the worker URL in the web app's "API Worker URL" field.
