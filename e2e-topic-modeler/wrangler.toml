# E2E Topic Modeler — Cloudflare Pages Configuration
# Deploy via: Cloudflare Dashboard → Pages → Connect to Git
# Or via CLI: npx wrangler pages deploy public/ --project-name=e2e-topic-modeler

name = "e2e-topic-modeler"
compatibility_date = "2024-12-01"

# Pages Functions (functions/api.js) are deployed automatically
# when the functions/ directory exists alongside the build output.

# Environment variables:
#   ANTHROPIC_API_KEY — set via Dashboard → Pages → Settings → Environment variables (encrypted)

# --- Legacy standalone worker config (kept for reference) ---
# To deploy the worker separately instead of using Pages Functions:
#   name = "e2e-topic-modeler-api"
#   main = "worker/index.js"
